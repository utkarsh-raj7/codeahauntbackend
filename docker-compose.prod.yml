services:
  # ─── API Server ───
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: cloudlab-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - lab-data:/app/lab-data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-labuser}:${POSTGRES_PASSWORD:-labpass}@postgres:5432/${POSTGRES_DB:-labdb}
      - REDIS_URL=redis://redis:6379
      - DOCKER_SOCKET=/var/run/docker.sock
      - CONTAINER_NETWORK=lab-network
      - LAB_DATA_DIR=/app/lab-data
      - PUBLIC_HOST=${PUBLIC_HOST:-}
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - internal
      - lab-network

  # ─── Background Worker ───
  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: cloudlab-worker
    restart: unless-stopped
    command: ["node", "dist/jobs/index.js"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - lab-data:/app/lab-data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-labuser}:${POSTGRES_PASSWORD:-labpass}@postgres:5432/${POSTGRES_DB:-labdb}
      - REDIS_URL=redis://redis:6379
      - DOCKER_SOCKET=/var/run/docker.sock
      - CONTAINER_NETWORK=lab-network
      - LAB_DATA_DIR=/app/lab-data
      - PUBLIC_HOST=${PUBLIC_HOST:-}
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - lab-network

  # ─── PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: cloudlab-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-labdb}
      POSTGRES_USER: ${POSTGRES_USER:-labuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labpass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-labuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: cloudlab-redis
    restart: unless-stopped
    command: redis-server --notify-keyspace-events KEA --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Nginx (Frontend + Reverse Proxy) ───
  nginx:
    image: nginx:1.25-alpine
    container_name: cloudlab-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_started
    networks:
      - internal
      - lab-network

  # ─── Traefik (Lab Container Routing) ───
  traefik:
    image: traefik:v3.0
    container_name: cloudlab-traefik
    restart: unless-stopped
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.network=lab-network
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --log.level=WARN
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - lab-network

volumes:
  pgdata:
  redisdata:
  lab-data:

networks:
  internal:
    driver: bridge
  lab-network:
    name: lab-network
    driver: bridge
