apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
type: Opaque
stringData:
  # Base64 encoded values should be managed by sealed-secrets in CI
  DATABASE_URL: "postgresql://labuser:devpassword@postgres:5432/labdb"
  REDIS_URL: "redis://redis:6379"
  JWT_SECRET: "replace-with-real-secret"
  JWT_EMBED_SECRET: "replace-with-embed-secret"
  DB_PASSWORD: "devpassword"
  PORT: "3000"
  FRONTEND_URL: "https://yourdomain.com"
  BASE_DOMAIN: "labs.yourdomain.com"
