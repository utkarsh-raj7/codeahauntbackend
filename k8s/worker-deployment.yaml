apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
  labels:
    app: lab-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab-worker
  template:
    metadata:
      labels:
        app: lab-worker
    spec:
      containers:
      - name: worker
        image: your-registry/lab-backend:latest
        command: ["node", "dist/worker.js"]
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - secretRef:
            name: api-secrets
