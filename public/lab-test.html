<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudLab — Interactive Labs</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a1f2e;
            --bg-card-hover: #222838;
            --border: #2a3040;
            --border-hover: #3b4560;
            --text-primary: #e8eaf0;
            --text-secondary: #8b95a8;
            --text-muted: #5c6478;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-yellow: #eab308;
            --accent-red: #ef4444;
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --accent-orange: #f97316;
            --accent-pink: #ec4899;
            --accent-indigo: #6366f1;
            --accent-emerald: #10b981;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── Header ─── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08), rgba(168, 85, 247, 0.06));
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #e8eaf0, #8b95a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pill::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-pill.idle {
            background: rgba(91, 100, 120, 0.15);
            color: #8b95a8;
        }

        .status-pill.provisioning {
            background: rgba(234, 179, 8, 0.12);
            color: var(--accent-yellow);
        }

        .status-pill.provisioning::before {
            animation: blink 1s infinite;
        }

        .status-pill.ready {
            background: rgba(34, 197, 94, 0.12);
            color: var(--accent-green);
        }

        .status-pill.error {
            background: rgba(239, 68, 68, 0.12);
            color: var(--accent-red);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.2
            }
        }

        /* ─── Layout ─── */
        .app {
            display: flex;
            height: calc(100vh - 69px);
        }

        .sidebar {
            width: 380px;
            min-width: 380px;
            overflow-y: auto;
            border-right: 1px solid var(--border);
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
        }

        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ─── Category Tabs ─── */
        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-primary);
        }

        .cat-tab {
            padding: 5px 10px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .cat-tab:hover {
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.04);
        }

        .cat-tab.active {
            background: rgba(59, 130, 246, 0.12);
            color: var(--accent-blue);
            border-color: rgba(59, 130, 246, 0.25);
        }

        /* ─── Lab Cards ─── */
        .lab-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .lab-card {
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 6px;
        }

        .lab-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            transform: translateX(2px);
        }

        .lab-card.selected {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.06);
            box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.15);
        }

        .lab-card.active-session {
            border-color: var(--accent-green);
            background: rgba(34, 197, 94, 0.06);
        }

        .lab-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .lab-card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .lab-card-desc {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .lab-card-meta {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lab-tag {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .diff-beginner {
            background: rgba(34, 197, 94, 0.12);
            color: var(--accent-green);
        }

        .diff-intermediate {
            background: rgba(234, 179, 8, 0.12);
            color: var(--accent-yellow);
        }

        .diff-advanced {
            background: rgba(239, 68, 68, 0.12);
            color: var(--accent-red);
        }

        .lab-time {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* ─── Terminal Panel ─── */
        .terminal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .terminal-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }

        .terminal-actions {
            display: flex;
            gap: 8px;
        }

        button {
            font-family: 'Inter', sans-serif;
            padding: 7px 14px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        button:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
        }

        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        button.primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #fff;
        }

        button.primary:hover {
            background: #2563eb;
        }

        button.success {
            background: var(--accent-green);
            border-color: var(--accent-green);
            color: #fff;
        }

        button.danger {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
            color: var(--accent-red);
        }

        button.danger:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        .placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--text-muted);
        }

        .placeholder-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08), rgba(168, 85, 247, 0.08));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .placeholder p {
            font-size: 14px;
        }

        .placeholder .sub {
            font-size: 12px;
            color: var(--text-muted);
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: #000;
        }

        .log-bar {
            padding: 6px 20px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border);
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ─── Category Colors ─── */
        .cat-dot {
            width: 8px;
            height: 8px;
            border-radius: 3px;
            display: inline-block;
            margin-right: 4px;
        }

        [data-cat="linux"] .cat-dot,
        .cat-tab[data-cat="linux"].active {
            --cat-color: var(--accent-green);
        }

        [data-cat="networking"] .cat-dot,
        .cat-tab[data-cat="networking"].active {
            --cat-color: var(--accent-cyan);
        }

        [data-cat="docker"] .cat-dot,
        .cat-tab[data-cat="docker"].active {
            --cat-color: var(--accent-blue);
        }

        [data-cat="kubernetes"] .cat-dot,
        .cat-tab[data-cat="kubernetes"].active {
            --cat-color: var(--accent-indigo);
        }

        [data-cat="databases"] .cat-dot,
        .cat-tab[data-cat="databases"].active {
            --cat-color: var(--accent-orange);
        }

        [data-cat="cicd"] .cat-dot,
        .cat-tab[data-cat="cicd"].active {
            --cat-color: var(--accent-yellow);
        }

        [data-cat="iac"] .cat-dot,
        .cat-tab[data-cat="iac"].active {
            --cat-color: var(--accent-purple);
        }

        [data-cat="observability"] .cat-dot,
        .cat-tab[data-cat="observability"].active {
            --cat-color: var(--accent-pink);
        }

        [data-cat="security"] .cat-dot,
        .cat-tab[data-cat="security"].active {
            --cat-color: var(--accent-red);
        }

        [data-cat="python"] .cat-dot,
        .cat-tab[data-cat="python"].active {
            --cat-color: var(--accent-emerald);
        }

        .cat-dot {
            background: var(--cat-color, var(--text-muted));
        }

        .lab-count {
            font-size: 10px;
            color: var(--text-muted);
            margin-left: 4px;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-hover);
        }

        /* ─── Guide Panel ─── */
        .guide-panel {
            display: none;
            max-height: 260px;
            overflow-y: auto;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.04), var(--bg-secondary));
            padding: 16px 20px;
        }

        .guide-panel.open {
            display: block;
        }

        .guide-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .guide-header h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .guide-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            border-left: 3px solid var(--accent-blue);
        }

        .guide-steps {
            list-style: none;
            counter-reset: step;
        }

        .guide-step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            transition: background 0.15s;
        }

        .guide-step:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .step-num {
            min-width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .step-content h4 {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .step-content p {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
            font-family: 'JetBrains Mono', monospace;
        }

        .step-cmd {
            display: block;
            font-size: 11px;
            color: #a5f3fc;
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            margin-top: 4px;
            border-radius: 4px;
            border: 1px solid transparent;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            transition: border-color 0.3s;
            word-break: break-all;
        }
        .step-cmd:hover {
            background: rgba(0,0,0,0.5);
            border-color: rgba(59,130,246,0.3);
        }

        .guide-toggle {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .guide-toggle.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.3);
            color: var(--accent-blue);
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-left">
            <div class="logo">☁</div>
            <h1>CloudLab</h1>
        </div>
        <div class="header-right">
            <span id="status" class="status-pill idle">idle</span>
        </div>
    </div>

    <div class="app">
        <div class="sidebar">
            <div class="category-tabs" id="categoryTabs"></div>
            <div class="lab-list" id="labList">
                <div class="placeholder" style="height:200px">
                    <p>Loading labs...</p>
                </div>
            </div>
        </div>

        <div class="main-panel">
            <div class="terminal-header">
                <span class="terminal-title" id="terminalTitle">No lab selected</span>
                <div class="terminal-actions">
                    <button id="guideBtn" class="guide-toggle" onclick="toggleGuide()" style="display:none">📖
                        Guide</button>
                    <button id="launchBtn" class="primary" disabled onclick="provision()">▶ Launch</button>
                    <button id="heartbeatBtn" disabled onclick="heartbeat()">♥</button>
                    <button id="destroyBtn" class="danger" disabled onclick="destroy()">✕ End</button>
                </div>
            </div>

            <div id="guidePanel" class="guide-panel"></div>

            <div id="placeholder" class="placeholder">
                <div class="placeholder-icon">🖥</div>
                <p>Select a lab from the sidebar and click <strong>Launch</strong></p>
                <span class="sub">40 labs across 10 categories</span>
            </div>
            <iframe id="terminal" style="display:none"></iframe>

            <div class="log-bar" id="log">Ready</div>
        </div>
    </div>

    <script>
        const IS_DEV = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        const API = IS_DEV ? 'http://localhost:3001/api/v1' : '/api/v1';
        let token = null;
        let sessionId = null;
        let pollTimer = null;
        let allLabs = [];
        let selectedLab = null;
        let activeCategory = 'all';

        const CAT_LABELS = {
            linux: 'Linux', networking: 'Network', docker: 'Docker',
            kubernetes: 'K8s', databases: 'Database', cicd: 'CI/CD',
            iac: 'IaC', observability: 'Monitor', security: 'Security', python: 'Python'
        };
        const CAT_ICONS = {
            linux: '🐧', networking: '🌐', docker: '🐳', kubernetes: '☸',
            databases: '🗄', cicd: '🔄', iac: '🏗', observability: '📊',
            security: '🔒', python: '🐍'
        };

        function log(msg) {
            const el = document.getElementById('log');
            el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        }

        function setStatus(s) {
            const el = document.getElementById('status');
            el.className = `status-pill ${s}`;
            el.textContent = s;
        }

        async function login() {
            log('Logging in...');
            const res = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: 'seed-user@example.com', password: 'password123' })
            });
            const data = await res.json();
            token = data.access_token;
            log('✅ Authenticated');
            return token;
        }

        async function fetchLabs() {
            try {
                const res = await fetch(`${API}/catalog/labs?limit=50`);
                allLabs = await res.json();
                buildCategoryTabs();
                renderLabs();
                log(`Loaded ${allLabs.length} labs`);
            } catch (err) {
                log(`❌ Failed to load labs: ${err.message}`);
            }
        }

        function buildCategoryTabs() {
            const cats = {};
            allLabs.forEach(l => {
                if (!cats[l.category]) cats[l.category] = 0;
                cats[l.category]++;
            });

            const el = document.getElementById('categoryTabs');
            let html = `<button class="cat-tab active" data-cat="all" onclick="filterCategory('all')">All<span class="lab-count">${allLabs.length}</span></button>`;

            const order = ['linux', 'networking', 'docker', 'kubernetes', 'databases', 'cicd', 'iac', 'observability', 'security', 'python'];
            order.forEach(cat => {
                if (!cats[cat]) return;
                html += `<button class="cat-tab" data-cat="${cat}" onclick="filterCategory('${cat}')">${CAT_LABELS[cat] || cat}<span class="lab-count">${cats[cat]}</span></button>`;
            });
            el.innerHTML = html;
        }

        function filterCategory(cat) {
            activeCategory = cat;
            document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
            renderLabs();
        }

        function renderLabs() {
            const filtered = activeCategory === 'all' ? allLabs : allLabs.filter(l => l.category === activeCategory);
            const el = document.getElementById('labList');

            if (!filtered.length) {
                el.innerHTML = '<div class="placeholder" style="height:100px"><p>No labs found</p></div>';
                return;
            }

            el.innerHTML = filtered.map(lab => `
        <div class="lab-card ${selectedLab?.id === lab.id ? 'selected' : ''} ${sessionId && selectedLab?.id === lab.id ? 'active-session' : ''}"
             data-cat="${lab.category}" onclick="selectLab('${lab.id}')">
            <div class="lab-card-header">
                <span class="lab-card-title"><span class="cat-dot"></span>${lab.title}</span>
            </div>
            <div class="lab-card-desc">${lab.description || ''}</div>
            <div class="lab-card-meta">
                <span class="lab-tag diff-${lab.difficulty}">${lab.difficulty}</span>
                <span class="lab-time">⏱ ${lab.estimated_minutes || lab.estimatedMinutes || 30}m</span>
                ${(lab.tags || []).slice(0, 2).map(t => `<span class="lab-time">#${t}</span>`).join('')}
            </div>
        </div>
    `).join('');
        }

        async function selectLab(id) {
            selectedLab = allLabs.find(l => l.id === id);
            if (!selectedLab) return;

            document.getElementById('terminalTitle').textContent = `${CAT_ICONS[selectedLab.category] || '📦'} ${selectedLab.title}`;
            document.getElementById('launchBtn').disabled = false;
            document.getElementById('guideBtn').style.display = 'inline-flex';

            // Fetch full lab details (with steps)
            try {
                const res = await fetch(`${API}/catalog/labs/${id}`);
                const full = await res.json();
                selectedLab = { ...selectedLab, ...full };
                renderGuide();
            } catch (e) { console.warn('Could not load lab details'); }

            renderLabs();
            log(`Selected: ${selectedLab.title}`);
        }

        function toggleGuide() {
            const panel = document.getElementById('guidePanel');
            const btn = document.getElementById('guideBtn');
            panel.classList.toggle('open');
            btn.classList.toggle('active');
        }

        function renderGuide() {
            const panel = document.getElementById('guidePanel');
            if (!selectedLab) { panel.innerHTML = ''; return; }

            const steps = selectedLab.steps || [];
            const resources = selectedLab.resources || [];
            const tags = selectedLab.tags || [];

            panel.innerHTML = `
                <div class="guide-header">
                    <h3>${CAT_ICONS[selectedLab.category] || '📦'} ${selectedLab.title}</h3>
                    <span class="lab-tag diff-${selectedLab.difficulty}" style="margin-left:auto">${selectedLab.difficulty}</span>
                </div>
                <div class="guide-desc">
                    ${selectedLab.description || 'No description'}
                    ${tags.length ? '<br><br><strong>Topics:</strong> ' + tags.map(t => `<code>#${t}</code>`).join(' ') : ''}
                </div>
                ${steps.length ? `
                <h4 style="font-size:12px;color:var(--text-secondary);margin-bottom:6px">📋 Exercises</h4>
                <ol class="guide-steps">
                    ${steps.map((s, i) => `
                        <li class="guide-step">
                            <span class="step-num">${i + 1}</span>
                            <div class="step-content">
                                <h4>${s.name || s.title || 'Step ' + (i + 1)}</h4>
                                ${s.validation_cmd ? `<code class="step-cmd" title="Click to copy" onclick="navigator.clipboard.writeText(this.textContent);this.style.borderColor='#4ade80';setTimeout(()=>this.style.borderColor='',800)">${s.validation_cmd}</code>` : ''}
                            </div>
                        </li>
                    `).join('')}
                </ol>` : '<p style="font-size:12px;color:var(--text-muted)">Open terminal and type <code>cat ~/GUIDE.md</code> for instructions</p>'}
                ${resources.length ? `<p style="font-size:11px;color:var(--text-muted);margin-top:8px">📚 ${resources.map(r => `<a href="${r}" target="_blank" style="color:var(--accent-blue)">${r.split('/').pop()}</a>`).join(' · ')}</p>` : ''}
            `;

            // Auto-open guide when lab is selected
            panel.classList.add('open');
            document.getElementById('guideBtn').classList.add('active');
        }

        async function provision() {
            if (!selectedLab) return;
            if (!token) await login();

            document.getElementById('launchBtn').disabled = true;
            setStatus('provisioning');
            log(`Provisioning ${selectedLab.title}...`);

            try {
                const res = await fetch(`${API}/labs/${selectedLab.id}/provision`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: '{}'
                });
                const data = await res.json();

                if (data.error) {
                    setStatus('error');
                    log(`❌ ${data.error.message || JSON.stringify(data.error)}`);
                    document.getElementById('launchBtn').disabled = false;
                    return;
                }

                sessionId = data.session_id || data.id;
                log(`Session ${sessionId?.slice(0, 8)}... polling`);
                renderLabs();
                pollTimer = setInterval(pollStatus, 3000);
            } catch (err) {
                setStatus('error');
                log(`❌ ${err.message}`);
                document.getElementById('launchBtn').disabled = false;
            }
        }

        async function pollStatus() {
            if (!sessionId) return;
            try {
                const res = await fetch(`${API}/labs/${sessionId}/status`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                log(`Status: ${data.status}${data.terminal_url ? ' — terminal ready' : ''}`);

                if (data.status === 'ready' && data.terminal_url) {
                    clearInterval(pollTimer);
                    setStatus('ready');
                    showTerminal(data.terminal_url);
                    document.getElementById('heartbeatBtn').disabled = false;
                    document.getElementById('destroyBtn').disabled = false;
                } else if (data.status === 'error') {
                    clearInterval(pollTimer);
                    setStatus('error');
                    log(`❌ ${data.error_message || 'Provision failed'}`);
                    document.getElementById('launchBtn').disabled = false;
                }
            } catch (err) {
                log(`Poll: ${err.message}`);
            }
        }

        function showTerminal(url) {
            document.getElementById('placeholder').style.display = 'none';
            const iframe = document.getElementById('terminal');
            iframe.style.display = 'block';
            iframe.src = url;
            log(`✅ Terminal: ${url}`);
        }

        async function heartbeat() {
            try {
                const res = await fetch(`${API}/labs/${sessionId}/heartbeat`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                log(`♥ ${data.time_remaining_seconds}s remaining`);
            } catch (err) { log(`♥ ${err.message}`); }
        }

        async function destroy() {
            if (!sessionId) return;
            document.getElementById('destroyBtn').disabled = true;
            try {
                await fetch(`${API}/labs/${sessionId}`, {
                    method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
                });
                setStatus('idle');
                document.getElementById('terminal').style.display = 'none';
                document.getElementById('placeholder').style.display = 'flex';
                document.getElementById('launchBtn').disabled = false;
                document.getElementById('heartbeatBtn').disabled = true;
                sessionId = null;
                renderLabs();
                log('✕ Lab destroyed');
            } catch (err) { log(`✕ ${err.message}`); }
        }

        // Boot
        fetchLabs();
    </script>
</body>
