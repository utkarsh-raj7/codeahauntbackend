version: '3.9'
services:
  api:
    build: . 
    ports: ['3000:3000']
    volumes:
      - ./src:/app/src
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker access
    env_file: .env.dev
    depends_on: [postgres, redis, traefik]

  worker:
    build: .
    command: npm run dev:worker
    volumes:
      - ./src:/app/src
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: .env.dev
    depends_on: [postgres, redis]

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: labdb
      POSTGRES_USER: labuser
      POSTGRES_PASSWORD: devpassword
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --notify-keyspace-events KEA

  traefik:
    image: traefik:v3.0
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.network=lab-network
      - --entrypoints.web.address=:80
    ports:
      - '80:80'
      - '8080:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata:

networks:
  default:
    name: lab-network
